<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD Atmosphere</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #c9b99a;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      gap: 40px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      color: #e8d5a3;
      text-transform: uppercase;
      opacity: 0.85;
      text-align: center;
    }

    #cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 28px 32px;
      border: 1px solid #3a3020;
      background: #111008;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
      min-width: 220px;
    }
    .card:hover { border-color: #7a6a4a; background: #191510; }

    .card-title {
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #e8d5a3;
    }

    .card-sub {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: #5a5040;
      text-align: center;
    }

    .qr-box {
      padding: 8px;
      background: #fff;
    }

    .qr-url {
      font-size: 0.72rem;
      color: #5a5040;
      letter-spacing: 0.05em;
      text-align: center;
      word-break: break-all;
    }

    #message {
      font-size: 0.85rem;
      color: #5a5040;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<h1>DnD Atmosphere</h1>

<div id="cards">
  <a class="card" id="card-player" href="/player.html">
    <div class="card-title">&#9679; Players</div>
    <div class="card-sub">View the scene</div>
    <div class="qr-box" id="qr-player"></div>
    <div class="qr-url" id="url-player"></div>
  </a>

  <a class="card" id="card-dm" href="/dm.html">
    <div class="card-title">&#9876; Game Master</div>
    <div class="card-sub">Generate &amp; control</div>
    <div class="qr-box" id="qr-dm"></div>
    <div class="qr-url" id="url-dm"></div>
  </a>
</div>

<div id="message">Loading network addresses...</div>

<script>
async function init() {
  const msgEl = document.getElementById('message');

  let ips = [];
  try {
    const resp = await fetch('/api.php?action=status');
    const data = await resp.json();
    ips = data.server_ips ?? [];
  } catch (_) {
    msgEl.textContent = 'Could not reach server.';
    return;
  }

  // Use first IP for QR codes; fall back to current hostname
  const host = ips.length > 0 ? ips[0] : location.hostname;
  const base = `http://${host}:8080`;

  const playerUrl = `${base}/player.html`;
  const dmUrl     = `${base}/dm.html`;

  new QRCode(document.getElementById('qr-player'), {
    text: playerUrl, width: 180, height: 180,
    correctLevel: QRCode.CorrectLevel.M
  });
  new QRCode(document.getElementById('qr-dm'), {
    text: dmUrl, width: 180, height: 180,
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('url-player').textContent = playerUrl;
  document.getElementById('url-dm').textContent     = dmUrl;

  msgEl.style.display = 'none';
}

init();
</script>

</body>
</html>
