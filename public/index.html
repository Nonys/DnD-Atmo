<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD Atmosphere Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #c9b99a;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      color: #e8d5a3;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    #qr-toggle {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: #5a5040;
      cursor: pointer;
      margin-bottom: 12px;
      user-select: none;
    }
    #qr-toggle:hover { color: #9a8a6a; }

    #qr-codes {
      display: none;
      gap: 20px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .qr-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .qr-box  { padding: 5px; background: #fff; border: 1px solid #3a3020; }
    .qr-item span { font-size: 0.65rem; color: #5a5040; letter-spacing: 0.04em; }

    /* ---- Main image display ---- */
    #image-frame {
      position: relative;
      width: 512px;
      max-width: 100%;
      aspect-ratio: 1;
      background: #1a1710;
      border: 1px solid #3a3020;
      margin-bottom: 16px;
      overflow: hidden;
    }

    #current-image, #prev-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #current-image { opacity: 0; transition: opacity 1.2s ease; z-index: 2; }
    #current-image.visible { opacity: 1; }
    #prev-image    { opacity: 0.25; z-index: 1; }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a3f2a;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      z-index: 0;
    }

    /* ---- Readiness indicators ---- */
    #readiness {
      width: 512px;
      max-width: 100%;
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
    }

    .indicator { display: flex; align-items: center; gap: 6px; }
    .indicator .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
      background: #4a4030; /* checking */
      transition: background 0.3s;
    }
    .indicator.ready  .dot { background: #5aaa5a; }
    .indicator.error  .dot { background: #aa4a4a; }
    .indicator.checking .dot {
      background: #7a6a3a;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .indicator.ready  { color: #6a9a6a; }
    .indicator.error  { color: #9a5a5a; }
    .indicator.checking { color: #7a6a4a; }

    #btn-grant-mic {
      padding: 2px 10px;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      border: 1px solid #5a7a5a;
      background: #141a14;
      color: #8aba8a;
      cursor: pointer;
    }
    #btn-grant-mic:hover { background: #1a241a; border-color: #7aaa7a; }

    /* ---- Controls ---- */
    #controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 28px;
      font-family: inherit;
      font-size: 1rem;
      border: 1px solid #5a4a2a;
      background: #1f1a10;
      color: #e8d5a3;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }
    button:hover:not(:disabled) { background: #2e2510; border-color: #9a7a3a; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-start  { border-color: #4a7a4a; color: #a8d4a8; }
    #btn-start:hover:not(:disabled)  { background: #162016; border-color: #6aaa6a; }
    #btn-cancel { border-color: #5a4a4a; color: #c49a9a; font-size: 0.82rem; padding: 10px 18px; }
    #btn-cancel:hover:not(:disabled) { background: #1e1414; border-color: #8a6a6a; }
    #btn-submit, #btn-text-submit { border-color: #7a6a2a; color: #e8d070; letter-spacing: 0.12em; }
    #btn-submit:hover:not(:disabled),
    #btn-text-submit:hover:not(:disabled) { background: #221e08; border-color: #c0a030; }

    /* ---- Mode toggle ---- */
    #mode-toggle {
      display: flex;
      border: 1px solid #3a3020;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      padding: 6px 24px;
      font-size: 0.75rem;
      border: none;
      border-radius: 0;
      background: #111008;
      color: #4a3f2a;
      letter-spacing: 0.1em;
    }
    .mode-btn:hover:not(.active) { background: #191510; color: #9a8a6a; border-color: transparent; }
    .mode-btn.active { background: #1f1a10; color: #e8d5a3; }

    /* ---- Text mode controls ---- */
    #text-controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      width: 512px;
      max-width: 100%;
    }
    #scene-input {
      width: 100%;
      height: 80px;
      background: #141210;
      border: 1px solid #3a3020;
      color: #c9b99a;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
    }
    #scene-input:focus { outline: none; border-color: #6a5a3a; }
    #scene-input::placeholder { color: #3a3020; }

    #timer {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      color: #e8d5a3;
      min-width: 60px;
      text-align: center;
    }
    #timer.recording { color: #d46a6a; }

    /* ---- Step progress ---- */
    #step-progress {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .step { display: flex; align-items: center; gap: 5px; color: #3a3020; transition: color 0.3s; }
    .step .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #3a3020;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .step.active { color: #c9a84a; }
    .step.active .dot { background: #c9a84a; animation: pulse 1.2s ease-in-out infinite; }
    .step.done   { color: #5aaa5a; }
    .step.done   .dot { background: #5aaa5a; }
    .step-sep { color: #3a3020; }

    /* ---- Transcription box ---- */
    #transcription-box {
      display: none;
      width: 512px;
      max-width: 100%;
      margin-bottom: 12px;
    }
    #transcription-box label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 5px;
    }
    #transcription-text {
      background: #0f0e0a;
      border: 1px solid #2a2518;
      color: #a09070;
      font-size: 0.88rem;
      font-style: italic;
      padding: 8px 10px;
      line-height: 1.5;
      min-height: 1.8em;
    }

    /* ---- Status ---- */
    #status {
      min-height: 1.4em;
      font-size: 0.85rem;
      color: #9a8a6a;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      text-align: center;
    }
    #status.error { color: #d46a6a; }

    /* ---- Prompt ---- */
    #prompt-area {
      width: 512px;
      max-width: 100%;
      margin-bottom: 16px;
    }
    #prompt-area label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a4a;
      margin-bottom: 6px;
    }
    #base-prompt {
      width: 100%;
      height: 72px;
      background: #141210;
      border: 1px solid #3a3020;
      color: #c9b99a;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
    }
    #base-prompt:focus { outline: none; border-color: #6a5a3a; }

    /* ---- Cost display ---- */
    #cost-bar {
      width: 512px;
      max-width: 100%;
      display: flex;
      gap: 24px;
      justify-content: center;
      font-size: 0.8rem;
      color: #6a6050;
      margin-bottom: 16px;
    }
    #cost-bar span { letter-spacing: 0.05em; }
    #cost-bar b { color: #9a8a5a; }

    /* ---- Gallery ---- */
    #gallery-label {
      width: 512px;
      max-width: 100%;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 8px;
    }

    #gallery {
      width: 512px;
      max-width: 100%;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .thumb-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    .thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border: 1px solid #2a2518;
      cursor: pointer;
      opacity: 0.65;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb:hover, .thumb.active { opacity: 1; border-color: #7a6a4a; }
    .btn-del {
      display: none;
      position: absolute;
      top: 3px; right: 3px;
      width: 18px; height: 18px;
      padding: 0;
      background: rgba(15,5,5,0.88);
      border: 1px solid #7a3a3a;
      color: #d46a6a;
      font-size: 0.8rem;
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
    }
    .btn-del:hover { background: #2a0a0a; border-color: #aa5a5a; }
    .thumb-wrap:hover .btn-del { display: block; }

    /* ---- Prompt display ---- */
    #prompt-display {
      display: none;
      width: 512px;
      max-width: 100%;
      margin-top: 10px;
    }
    #prompt-display label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 5px;
    }
    #prompt-text {
      background: #0f0e0a;
      border: 1px solid #2a2518;
      color: #7a6a4a;
      font-size: 0.8rem;
      padding: 8px 10px;
      line-height: 1.5;
      height: 90px;
      overflow-y: auto;
      white-space: pre-wrap;
      resize: vertical;
    }
  </style>
</head>
<body>

<h1>DnD Atmosphere</h1>
<div id="qr-toggle" style="display:none">▶ Show player QR codes</div>
<div id="qr-codes"></div>

<div id="image-frame">
  <div id="placeholder">Awaiting vision...</div>
  <img id="prev-image" src="" alt="">
  <img id="current-image" src="" alt="">
</div>

<div id="readiness">
  <span id="ind-mic"   class="indicator checking"><span class="dot"></span>Microphone</span>
  <button id="btn-grant-mic" style="display:none">Grant mic access</button>
  <span id="ind-model" class="indicator checking"><span class="dot"></span>Whisper model</span>
  <span id="ind-key"   class="indicator checking"><span class="dot"></span>API key</span>
</div>

<div id="mode-toggle">
  <button class="mode-btn active" id="btn-mode-voice">&#9679; Voice</button>
  <button class="mode-btn"        id="btn-mode-text">&#10002; Type</button>
</div>

<div id="step-progress">
  <span id="step-transcribe" class="step"><span class="dot"></span>Transcribing</span>
  <span class="step-sep">→</span>
  <span id="step-generate" class="step"><span class="dot"></span>Generating image</span>
</div>

<div id="controls">
  <button id="btn-start" disabled>&#9679; Start Listen</button>
  <button id="btn-cancel" style="display:none">&#10005; I Changed My Mind</button>
  <span id="timer">5:00</span>
  <button id="btn-submit" style="display:none">&#10024; Do The Magic</button>
</div>

<div id="text-controls">
  <textarea id="scene-input" placeholder="Describe the scene..."></textarea>
  <button id="btn-text-submit" disabled>&#10024; Do The Magic</button>
</div>

<div id="status">Checking prerequisites...</div>

<div id="transcription-box">
  <label>Heard</label>
  <div id="transcription-text"></div>
</div>

<div id="prompt-area">
  <label>Base Style Prompt</label>
  <textarea id="base-prompt" spellcheck="false">fantasy tabletop RPG atmosphere, dramatic lighting, detailed environment art, digital painting, dark fantasy</textarea>
</div>

<div id="cost-bar">
  <span>Image: <b id="cost-image">—</b></span>
  <span>Session: <b id="cost-session">$0.000</b></span>
  <span>Lifetime: <b id="cost-lifetime">$0.000</b></span>
</div>

<div id="gallery-label">Session Gallery</div>
<div id="gallery"></div>
<div id="prompt-display">
  <label>Prompt used</label>
  <div id="prompt-text"></div>
</div>

<script>
// ============================================================
// State
// ============================================================
const MAX_RECORD_MS = 5 * 60 * 1000;

let mediaRecorder  = null;
let audioChunks    = [];
let recordingTimer = null;
let countdownTimer = null;
let isGenerating   = false;

// Readiness flags — all must be true before Record is enabled
const ready = { mic: false, model: false, apiKey: false };
let micBlocked  = false; // true only when mic is explicitly denied or unavailable
let currentMode = 'voice';

// ============================================================
// DOM refs
// ============================================================
const btnStart     = document.getElementById('btn-start');
const btnCancel    = document.getElementById('btn-cancel');
const btnSubmit    = document.getElementById('btn-submit');
const timerEl      = document.getElementById('timer');
const statusEl     = document.getElementById('status');
const currentImg   = document.getElementById('current-image');
const prevImg      = document.getElementById('prev-image');
const placeholder  = document.getElementById('placeholder');
const gallery      = document.getElementById('gallery');
const basePromptEl = document.getElementById('base-prompt');
const costImage    = document.getElementById('cost-image');
const costSession  = document.getElementById('cost-session');
const costLifetime = document.getElementById('cost-lifetime');
const indMic           = document.getElementById('ind-mic');
const indModel         = document.getElementById('ind-model');
const indKey           = document.getElementById('ind-key');
const btnGrantMic      = document.getElementById('btn-grant-mic');
const stepProgress     = document.getElementById('step-progress');
const stepTranscribe   = document.getElementById('step-transcribe');
const stepGenerate     = document.getElementById('step-generate');
const transcriptionBox = document.getElementById('transcription-box');
const transcriptionTxt = document.getElementById('transcription-text');
const promptDisplay    = document.getElementById('prompt-display');
const promptTxt        = document.getElementById('prompt-text');
const btnModeVoice     = document.getElementById('btn-mode-voice');
const btnModeText      = document.getElementById('btn-mode-text');
const textControls     = document.getElementById('text-controls');
const sceneInput       = document.getElementById('scene-input');
const btnTextSubmit    = document.getElementById('btn-text-submit');

// ============================================================
// Pre-flight checks (run on load)
// ============================================================
async function preflight() {
  await Promise.all([checkBackendStatus(), checkMicPermission(), loadGallery()]);
}

async function checkBackendStatus() {
  try {
    const resp = await fetch('/api.php?action=status');
    const data = await resp.json();

    setIndicator(indModel, data.model_ready, 'Model ready', 'Model not found — run: dnd model');
    ready.model = data.model_ready;

    setIndicator(indKey, data.api_key_set, 'API key set', 'OPENAI_API_KEY missing');
    ready.apiKey = data.api_key_set;

    if (data.session_cost)  costSession.textContent  = '$' + data.session_cost.toFixed(3);
    if (data.lifetime_cost) costLifetime.textContent = '$' + data.lifetime_cost.toFixed(3);
    if (data.server_ips && data.server_ips.length) {
      const lanEl = document.getElementById('lan-url');
      const qrEl  = document.getElementById('qr-codes');

      const qrToggle = document.getElementById('qr-toggle');
      qrToggle.style.display = '';
      qrToggle.addEventListener('click', () => {
        const visible = qrEl.style.display === 'flex';
        qrEl.style.display = visible ? 'none' : 'flex';
        qrToggle.textContent = (visible ? '▶' : '▼') + ' Show player QR codes';
      });

      data.server_ips.forEach(ip => {
        const url  = `http://${ip}:8080/viewer.html`;
        const item = document.createElement('div');
        item.className = 'qr-item';
        const box = document.createElement('div');
        box.className = 'qr-box';
        new QRCode(box, { text: url, width: 120, height: 120, correctLevel: QRCode.CorrectLevel.M });
        const label = document.createElement('span');
        label.textContent = ip;
        item.appendChild(box);
        item.appendChild(label);
        qrEl.appendChild(item);
      });

    }
  } catch (e) {
    setIndicator(indModel, false, '', 'Backend unreachable');
    setIndicator(indKey,   false, '', 'Backend unreachable');
  }
  updateStartButton();
}

async function checkMicPermission() {
  // Browsers silently block mic on plain HTTP (non-localhost)
  if (!window.isSecureContext) {
    setIndicator(indMic, false, '', 'Microphone requires HTTPS — use localhost or add HTTPS');
    micBlocked = true;
    updateStartButton();
    return;
  }

  // Try the Permissions API (non-prompting check)
  if (navigator.permissions) {
    try {
      const result = await navigator.permissions.query({ name: 'microphone' });
      applyMicPermission(result.state);
      result.onchange = () => applyMicPermission(result.state);
      return;
    } catch (_) { /* browser doesn't support mic query — fall through */ }
  }

  // Can't query state — allow button click to trigger the browser prompt
  setIndicator(indMic, null, '', 'Click Record to grant access');
  micBlocked = false;
  updateStartButton();
}

function applyMicPermission(state) {
  if (state === 'granted') {
    setIndicator(indMic, true, 'Microphone ready');
    ready.mic = true;
    micBlocked = false;
    btnGrantMic.style.display = 'none';
  } else if (state === 'denied') {
    setIndicator(indMic, false, '', 'Microphone blocked — check chrome://settings/content/microphone');
    ready.mic = false;
    micBlocked = true;
    btnGrantMic.style.display = 'none';
  } else {
    // 'prompt' — not asked yet
    setIndicator(indMic, null, '', 'Permission not granted');
    ready.mic = false;
    micBlocked = false;
    btnGrantMic.style.display = '';
  }
  updateStartButton();
}

async function requestMicAccess() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    applyMicPermission('granted');
  } catch (e) {
    applyMicPermission('denied');
  }
}

btnGrantMic.addEventListener('click', requestMicAccess);

// ============================================================
// Indicator helper
// ============================================================
function setIndicator(el, state, okLabel, errLabel = '') {
  el.className = 'indicator ' + (state === true ? 'ready' : state === false ? 'error' : 'checking');
  const label = state === true ? okLabel : (errLabel || okLabel);
  el.innerHTML = '<span class="dot"></span>' + label;
}

// ============================================================
// Recording
// ============================================================
let cancelPending = false;

btnStart.addEventListener('click',  startRecording);
btnCancel.addEventListener('click', cancelRecording);
btnSubmit.addEventListener('click', submitRecording);

async function startRecording() {
  // If mic state was 'prompt', request permission now
  if (!ready.mic) {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach(t => t.stop());
      ready.mic = true;
      setIndicator(indMic, true, 'Microphone ready');
      updateStartButton();
    } catch (e) {
      setIndicator(indMic, false, '', 'Microphone blocked — allow in browser settings');
      ready.mic = false;
      updateStartButton();
      return;
    }
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setIndicator(indMic, false, '', 'Microphone access lost');
    ready.mic = false;
    updateStartButton();
    return;
  }

  cancelPending = false;
  audioChunks   = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    if (cancelPending) {
      cancelPending = false;
      audioChunks   = [];
      resetUI();
      return;
    }
    handleRecordingComplete();
  };
  mediaRecorder.start(1000);

  // Switch to recording UI
  btnStart.style.display  = 'none';
  btnCancel.style.display = '';
  btnSubmit.style.display = '';
  timerEl.classList.add('recording');
  startCountdown(MAX_RECORD_MS / 1000);

  recordingTimer = setTimeout(() => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      setStatus('5-minute limit reached — submitting.');
      submitRecording();
    }
  }, MAX_RECORD_MS);
}

function cancelRecording() {
  cancelPending = true;
  clearTimeout(recordingTimer);
  clearInterval(countdownTimer);
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  timerEl.classList.remove('recording');
  updateTimerDisplay(MAX_RECORD_MS / 1000);
  setStatus('');
}

function submitRecording() {
  clearTimeout(recordingTimer);
  clearInterval(countdownTimer);
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  // Hide all buttons while processing — resetUI will restore them when done
  btnCancel.style.display = 'none';
  btnSubmit.style.display = 'none';
  timerEl.classList.remove('recording');
}

function startCountdown(totalSeconds) {
  let remaining = totalSeconds;
  updateTimerDisplay(remaining);
  countdownTimer = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) clearInterval(countdownTimer);
  }, 1000);
}

function updateTimerDisplay(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
}

// ============================================================
// After recording: two-step pipeline
// ============================================================
async function handleRecordingComplete() {
  if (audioChunks.length === 0) {
    setStatus('No audio captured.', true);
    resetUI();
    return;
  }

  isGenerating = true;
  transcriptionBox.style.display = 'none';
  transcriptionTxt.textContent   = '';

  // ── Step 1: Transcribe ──────────────────────────────────
  showSteps('transcribe');
  setStatus('Transcribing speech...');

  const blob     = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
  const formData = new FormData();
  formData.append('action',      'transcribe');
  formData.append('audio',       blob, 'recording.webm');
  formData.append('base_prompt', basePromptEl.value.trim());

  let transcribeResult;
  try {
    const resp = await fetch('/api.php', { method: 'POST', body: formData });
    transcribeResult = await resp.json();
    if (!resp.ok) throw new Error(transcribeResult.error ?? `HTTP ${resp.status}`);
  } catch (err) {
    hideSteps();
    setStatus('Transcription error: ' + err.message, true);
    isGenerating = false;
    resetUI();
    return;
  }

  // Show transcription result
  if (transcribeResult.transcription) {
    transcriptionTxt.textContent   = transcribeResult.transcription;
    transcriptionBox.style.display = 'block';
  } else {
    transcriptionTxt.textContent   = '(nothing heard)';
    transcriptionBox.style.display = 'block';
  }

  // ── Step 2: Generate image ──────────────────────────────
  showSteps('generate');
  setStatus('Generating image...');

  const formData2 = new FormData();
  formData2.append('action',       'generate');
  formData2.append('base_prompt',  basePromptEl.value.trim());
  formData2.append('scene',        transcribeResult.transcription);

  let genResult;
  try {
    const resp2 = await fetch('/api.php', { method: 'POST', body: formData2 });
    genResult = await resp2.json();
    if (!resp2.ok) throw new Error(genResult.error ?? `HTTP ${resp2.status}`);
  } catch (err) {
    hideSteps();
    setStatus('Image generation error: ' + err.message, true);
    isGenerating = false;
    resetUI();
    return;
  }

  hideSteps();
  displayImage(genResult.image_url, genResult.prompt_used);

  costImage.textContent    = '$' + genResult.cost_image.toFixed(3);
  costSession.textContent  = '$' + genResult.cost_session.toFixed(3);
  costLifetime.textContent = '$' + genResult.cost_lifetime.toFixed(3);

  const epicLines = [
    'The vision takes shape... let it wash over you.',
    'The realm reveals itself. Breathe it in.',
    'The mists part. What do you see?',
    'Reality bends to your words.',
    'The scene is set. The dice await.',
    'Your world, rendered. Take a moment.',
    'The veil lifts. Behold.',
    'The arcane mirrors reflect your vision.',
  ];
  setStatus(epicLines[Math.floor(Math.random() * epicLines.length)]);
  isGenerating = false;
  updateTimerDisplay(MAX_RECORD_MS / 1000);
  resetUI();
}

// ============================================================
// Mode toggle
// ============================================================
btnModeVoice.addEventListener('click', () => switchMode('voice'));
btnModeText.addEventListener('click',  () => switchMode('text'));

function switchMode(mode) {
  currentMode = mode;
  btnModeVoice.classList.toggle('active', mode === 'voice');
  btnModeText.classList.toggle('active',  mode === 'text');
  document.getElementById('controls').style.display = mode === 'voice' ? 'flex'  : 'none';
  textControls.style.display = mode === 'text'  ? 'flex'  : 'none';
  indMic.style.display       = mode === 'text'  ? 'none'  : '';
  btnGrantMic.style.display  = mode === 'text'  ? 'none'  : (micBlocked ? '' : 'none');
  if (mode === 'voice') transcriptionBox.style.display = 'none';
  updateStartButton();
  updateTextButton();
}

function updateTextButton() {
  const hasText = sceneInput.value.trim().length > 0;
  btnTextSubmit.disabled = !ready.apiKey || isGenerating || !hasText;
}

sceneInput.addEventListener('input', updateTextButton);

// ============================================================
// Text mode submit
// ============================================================
btnTextSubmit.addEventListener('click', handleTextSubmit);

async function handleTextSubmit() {
  const sceneText  = sceneInput.value.trim();
  const basePrompt = basePromptEl.value.trim();

  isGenerating = true;
  updateTextButton();

  // Show only the generate step
  stepProgress.style.display   = 'flex';
  stepTranscribe.style.display = 'none';
  stepGenerate.className       = 'step active';
  setStatus('Generating image...');

  const fd = new FormData();
  fd.append('action',      'generate');
  fd.append('base_prompt', basePrompt);
  fd.append('scene',       sceneText);

  let genResult;
  try {
    const resp = await fetch('/api.php', { method: 'POST', body: fd });
    genResult = await resp.json();
    if (!resp.ok) throw new Error(genResult.error ?? `HTTP ${resp.status}`);
  } catch (err) {
    hideSteps();
    setStatus('Image generation error: ' + err.message, true);
    isGenerating = false;
    updateTextButton();
    return;
  }

  hideSteps();
  displayImage(genResult.image_url, genResult.prompt_used);

  costImage.textContent    = '$' + genResult.cost_image.toFixed(3);
  costSession.textContent  = '$' + genResult.cost_session.toFixed(3);
  costLifetime.textContent = '$' + genResult.cost_lifetime.toFixed(3);

  const epicLines = [
    'The vision takes shape... let it wash over you.',
    'The realm reveals itself. Breathe it in.',
    'The mists part. What do you see?',
    'Reality bends to your words.',
    'The scene is set. The dice await.',
    'Your world, rendered. Take a moment.',
    'The veil lifts. Behold.',
    'The arcane mirrors reflect your vision.',
  ];
  setStatus(epicLines[Math.floor(Math.random() * epicLines.length)]);

  isGenerating = false;
  resetUI();
}

// ============================================================
// Step progress helpers
// ============================================================
function showSteps(activeStep) {
  stepProgress.style.display = 'flex';
  if (activeStep === 'transcribe') {
    stepTranscribe.className = 'step active';
    stepGenerate.className   = 'step';
  } else {
    stepTranscribe.className = 'step done';
    stepGenerate.className   = 'step active';
  }
}

function hideSteps() {
  stepProgress.style.display   = 'none';
  stepTranscribe.style.display = '';
  stepTranscribe.className     = 'step';
  stepGenerate.className       = 'step';
}

// ============================================================
// Image display with fade
// ============================================================
function displayImage(url, prompt = '') {
  const thumb = addThumb(url, prompt, true); // prepend — new images go to the front
  selectThumb(thumb, url, prompt);
}

function addThumb(url, prompt = '', prepend = false) {
  const wrap = document.createElement('div');
  wrap.className = 'thumb-wrap';

  const img = document.createElement('img');
  img.src = url;
  img.className = 'thumb';
  img.dataset.prompt = prompt;
  img.addEventListener('click', () => selectThumb(img, url, prompt));

  wrap.appendChild(img);

  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    const del = document.createElement('button');
    del.className = 'btn-del';
    del.textContent = '×';
    del.title = 'Delete image';
    del.addEventListener('click', e => {
      e.stopPropagation();
      deleteImage(wrap, img, url);
    });
    wrap.appendChild(del);
  }

  if (prepend && gallery.firstChild) {
    gallery.insertBefore(wrap, gallery.firstChild);
  } else {
    gallery.appendChild(wrap);
  }
  return img;
}

async function deleteImage(wrap, img, url) {
  if (!confirm('Delete this image?')) return;

  const fd = new FormData();
  fd.append('action', 'delete');
  fd.append('url', url);

  try {
    const resp = await fetch('/api.php', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error);
  } catch (e) {
    setStatus('Delete failed: ' + e.message, true);
    return;
  }

  const wasActive = img.classList.contains('active');
  if (wasActive) {
    const allWraps = [...gallery.querySelectorAll('.thumb-wrap')];
    const idx      = allWraps.indexOf(wrap);
    const next     = allWraps[idx + 1] || allWraps[idx - 1];
    if (next) {
      const nextImg = next.querySelector('.thumb');
      selectThumb(nextImg, nextImg.src, nextImg.dataset.prompt || '');
    } else {
      currentImg.classList.remove('visible');
      currentImg.src = '';
      placeholder.style.display = '';
      promptDisplay.style.display = 'none';
    }
  }

  wrap.remove();
}

function selectThumb(thumbEl, url, prompt) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumbEl.classList.add('active');
  placeholder.style.display = 'none';
  if (currentImg.src && !currentImg.src.endsWith('undefined')) prevImg.src = currentImg.src;
  currentImg.classList.remove('visible');
  currentImg.src = url;
  currentImg.onload = () => currentImg.classList.add('visible');
  if (prompt) {
    promptTxt.textContent = prompt;
    promptDisplay.style.display = 'block';
  } else {
    promptDisplay.style.display = 'none';
  }
}

// ============================================================
// Gallery: load existing images from sessions/ on startup
// ============================================================
async function loadGallery() {
  try {
    const resp = await fetch('/api.php?action=gallery');
    const data = await resp.json();
    if (!data.images || data.images.length === 0) return;

    data.images.forEach(item => addThumb(item.url, item.prompt)); // append; API returns newest-first

    // Auto-show the most recent image
    const first     = data.images[0];
    const firstThumb = gallery.querySelector('.thumb');
    if (firstThumb) selectThumb(firstThumb, first.url, first.prompt);
  } catch (_) {
    // non-critical — silently ignore
  }
}


function resetUI() {
  btnCancel.style.display = 'none';
  btnSubmit.style.display = 'none';
  if (currentMode === 'voice') btnStart.style.display = '';
  updateStartButton();
  updateTextButton();
}

function updateStartButton() {
  const micOk    = ready.mic || !micBlocked;
  const allReady = micOk && ready.model && ready.apiKey;
  btnStart.disabled = !allReady || isGenerating;
  // mode buttons disabled during recording/generation
  btnModeVoice.disabled = isGenerating || btnCancel.style.display !== 'none';
  btnModeText.disabled  = isGenerating || btnCancel.style.display !== 'none';

  if (!allReady && !isGenerating) {
    const missing = [];
    if (!micOk)        missing.push('microphone');
    if (!ready.model)  missing.push('whisper model');
    if (!ready.apiKey) missing.push('API key');
    setStatus('Not ready: ' + missing.join(', ') + '.', true);
  } else if (allReady && !isGenerating) {
    setStatus('');
  }
}

// ============================================================
// Helpers
// ============================================================
function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'error' : '';
}

// ── Base prompt persistence ───────────────────────────────────
const PROMPT_KEY = 'dnd-atmo-base-prompt';
const saved = localStorage.getItem(PROMPT_KEY);
if (saved !== null) basePromptEl.value = saved;
basePromptEl.addEventListener('blur', () => localStorage.setItem(PROMPT_KEY, basePromptEl.value));

// ── Boot ─────────────────────────────────────────────────────
preflight();
</script>
