<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — DnD Atmosphere</title>
  <link rel="stylesheet" href="/theme.css">
  <script src="/shared.js"></script>
<style>
  body { padding-bottom: 40px; }

  #upload-area {
    width: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* ---- Drop zone ---- */
  #upload-drop {
    width: 100%;
    min-height: 110px;
    background: #141210;
    border: 1px dashed #3a3020;
    color: #4a3f2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    position: relative;
  }
  #upload-drop:hover, #upload-drop.dragover { border-color: #6a5a3a; color: #9a8a6a; }
  #upload-drop.has-file { border-color: #4a7a4a; color: #7aba7a; }
  #upload-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* ---- Description ---- */
  #upload-desc {
    width: 100%;
    height: 60px;
    background: #141210;
    border: 1px solid #3a3020;
    color: #c9b99a;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 8px 10px;
    resize: vertical;
    line-height: 1.5;
  }
  #upload-desc:focus { outline: none; border-color: #6a5a3a; }
  #upload-desc::placeholder { color: #3a3020; }

  /* ---- Hidden checkbox ---- */
  .hidden-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: #7a6a4a;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
  }
  .hidden-label input[type="checkbox"] { width: 14px; height: 14px; accent-color: #7a6a4a; cursor: pointer; }

  /* ---- Submit button ---- */
  button {
    padding: 10px 28px;
    font-family: inherit;
    font-size: 1rem;
    border: 1px solid #5a4a2a;
    background: #1f1a10;
    color: #e8d5a3;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
  }
  button:hover:not(:disabled) { background: #2e2510; border-color: #9a7a3a; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #btn-submit { border-color: #7a6a2a; color: #e8d070; }
  #btn-submit:hover:not(:disabled) { background: #221e08; border-color: #c0a030; }

  /* ---- Step progress ---- */
  #step-progress { display: none; align-items: center; gap: 10px; font-size: 0.78rem; letter-spacing: 0.06em; }
  .step { display: flex; align-items: center; gap: 5px; color: #3a3020; transition: color 0.3s; }
  .step .dot { width: 7px; height: 7px; border-radius: 50%; background: #3a3020; flex-shrink: 0; transition: background 0.3s; }
  .step.active { color: #c9a84a; }
  .step.active .dot { background: #c9a84a; animation: pulse 1.2s ease-in-out infinite; }
  .step.done { color: #5aaa5a; }
  .step.done .dot { background: #5aaa5a; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ---- Status ---- */
  #status { min-height: 1.4em; font-size: 0.85rem; color: #9a8a6a; letter-spacing: 0.06em; text-align: center; }
</style>
</head>
<body>

<h1><a href="/">DnD Atmosphere</a></h1>

<nav id="dm-nav">
  <a href="/generate.html">&#9881; Generate</a>
  <a href="/upload.html" class="active">&#8679; Upload</a>
  <a href="/gallery.html">&#9783; Gallery</a>
  <a href="/logs.html">&#9776; Logs</a>
</nav>

<div id="upload-area">

  <div id="upload-drop">
    <span id="drop-label">Click or drop images here</span>
    <input type="file" id="upload-file" accept="image/*" multiple>
  </div>

  <textarea id="upload-desc" placeholder="Description (optional)"></textarea>

  <label class="hidden-label">
    <input type="checkbox" id="chk-hidden"> Hide from players
  </label>

  <button id="btn-submit" disabled>&#8679; Add to Gallery</button>

  <div id="step-progress">
    <span id="step-upload" class="step"><span class="dot"></span>Uploading</span>
  </div>

  <div id="status"></div>

</div>

<script>
let isUploading = false;

const uploadFile  = document.getElementById('upload-file');
const uploadDrop  = document.getElementById('upload-drop');
const dropLabel   = document.getElementById('drop-label');
const uploadDesc  = document.getElementById('upload-desc');
const chkHidden   = document.getElementById('chk-hidden');
const btnSubmit   = document.getElementById('btn-submit');
const stepProgress = document.getElementById('step-progress');
const stepUpload  = document.getElementById('step-upload');
const statusEl    = document.getElementById('status');

function setStatus(msg) { statusEl.textContent = msg; }

function updateButton() {
  btnSubmit.disabled = isUploading || !uploadFile.files || uploadFile.files.length === 0;
}

function updateDropLabel() {
  const n = uploadFile.files?.length ?? 0;
  if (n === 0) {
    dropLabel.textContent = 'Click or drop images here';
    uploadDrop.classList.remove('has-file');
  } else if (n === 1) {
    dropLabel.textContent = uploadFile.files[0].name;
    uploadDrop.classList.add('has-file');
  } else {
    dropLabel.textContent = `${n} images selected`;
    uploadDrop.classList.add('has-file');
  }
}

uploadFile.addEventListener('change', () => { updateDropLabel(); updateButton(); });

uploadDrop.addEventListener('dragover',  e => { e.preventDefault(); uploadDrop.classList.add('dragover'); });
uploadDrop.addEventListener('dragleave', () => uploadDrop.classList.remove('dragover'));
uploadDrop.addEventListener('drop', e => {
  e.preventDefault();
  uploadDrop.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    const dt = new DataTransfer();
    [...e.dataTransfer.files].forEach(f => dt.items.add(f));
    uploadFile.files = dt.files;
    updateDropLabel();
    updateButton();
  }
});

btnSubmit.addEventListener('click', handleUpload);

async function handleUpload() {
  const files = [...(uploadFile.files ?? [])];
  if (files.length === 0) return;

  isUploading = true;
  updateButton();
  stepProgress.style.display = 'flex';
  stepUpload.className = 'step active';
  setStatus('');

  const desc   = uploadDesc.value.trim();
  const hidden = chkHidden.checked;

  let lastUrl = null;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    setStatus(files.length > 1 ? `Uploading ${i + 1} / ${files.length}...` : 'Uploading...');

    const fd = new FormData();
    fd.append('action',      'upload');
    fd.append('image',       file, file.name);
    fd.append('description', desc);
    fd.append('hidden',      hidden ? '1' : '0');

    try {
      const resp   = await fetch('/api.php', { method: 'POST', body: fd });
      const result = await resp.json();
      if (!resp.ok) throw new Error(result.error ?? `HTTP ${resp.status}`);
      lastUrl = result.image_url;
      stepUpload.className = 'step done';
    } catch (err) {
      stepProgress.style.display = 'none';
      showToast(`Upload failed (${file.name}): ` + err.message, 'error');
      isUploading = false;
      updateButton();
      setStatus('');
      return;
    }
  }

  stepProgress.style.display = 'none';
  setStatus(files.length > 1 ? `${files.length} images added.` : 'Image added.');

  showToast(
    files.length > 1 ? `${files.length} images added to gallery.` : 'Image added to gallery.',
    'success',
    { href: '/gallery.html', label: 'Go to Gallery' }
  );

  uploadFile.value        = '';
  uploadDesc.value        = '';
  chkHidden.checked       = false;
  updateDropLabel();
  isUploading = false;
  updateButton();
}
</script>

</body>
</html>
