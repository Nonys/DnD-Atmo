<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD Atmosphere</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    h1 a { margin-bottom: 16px; }

    #image-frame { width: min(calc(100vw - 32px), 1400px); }

    /* ---- Prompt display (player overrides) ---- */
    #prompt-display { width: min(800px, calc(100vw - 32px)); }
    #prompt-text { max-height: 180px; }

    /* ---- Carousel ---- */
    #carousel {
      width: min(calc(100vw - 32px), 1400px);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 16px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: #3a3020 #0d0d0f;
    }
    #carousel::-webkit-scrollbar { height: 4px; }
    #carousel::-webkit-scrollbar-track { background: #0d0d0f; }
    #carousel::-webkit-scrollbar-thumb { background: #3a3020; }

    .thumb {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 1px solid #2a2518;
      cursor: pointer;
      opacity: 0.55;
      scroll-snap-align: start;
      transition: opacity 0.2s, border-color 0.2s, transform 0.12s;
    }
    .thumb:hover, .thumb.active { opacity: 1; border-color: #7a6a4a; }
    .thumb:active { transform: scale(0.92); }

    #new-badge {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      background: #1a1a0a;
      border: 1px solid #7a6a2a;
      color: #e8d070;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      animation: fadein 0.5s ease;
    }
  </style>
</head>
<body>

<h1><a href="/">DnD Atmosphere</a></h1>

<div id="carousel"></div>

<div id="image-frame">
  <div id="placeholder">Awaiting vision...</div>
  <img id="prev-image" src="" alt="">
  <img id="current-image" src="" alt="">
</div>

<div id="prompt-display">
  <label>Prompt used</label>
  <div id="prompt-text"></div>
</div>

<div id="new-badge">✦ New vision</div>

<script>
const currentImg    = document.getElementById('current-image');
const prevImg       = document.getElementById('prev-image');
const placeholder   = document.getElementById('placeholder');
const carousel      = document.getElementById('carousel');
const newBadge      = document.getElementById('new-badge');
const promptDisplay = document.getElementById('prompt-display');
const promptTxt     = document.getElementById('prompt-text');
const imageFrame    = document.getElementById('image-frame');

let latestUrl  = null;
let badgeTimer = null;

async function fetchGallery() {
  try {
    const resp = await fetch('/api.php?action=gallery');
    const data = await resp.json();
    return data.images ?? [];
  } catch (_) {
    return [];
  }
}

function showImage(url, prompt = '', slow = false) {
  placeholder.style.display = 'none';

  if (currentImg.classList.contains('visible') && currentImg.src !== url) {
    prevImg.src = currentImg.src;
    prevImg.classList.toggle('slow', slow);
    prevImg.style.opacity = '1';
    prevImg.offsetHeight;
    prevImg.style.opacity = '0';
  }

  currentImg.classList.remove('visible');
  currentImg.classList.toggle('slow', slow);
  currentImg.src = url;
  currentImg.onload = () => {
    imageFrame.style.aspectRatio = `${currentImg.naturalWidth} / ${currentImg.naturalHeight}`;
    currentImg.classList.add('visible');
  };
  if (prompt) {
    promptTxt.textContent = prompt;
    promptDisplay.style.display = 'block';
  } else {
    promptDisplay.style.display = 'none';
  }
}

function urlPath(url) {
  return new URL(url, location.href).pathname;
}

function addThumb(url, prompt = '') {
  const img = document.createElement('img');
  img.src = url;
  img.loading = 'lazy';
  img.className = 'thumb';
  img.dataset.prompt = prompt;
  img.addEventListener('click', () => {
    carousel.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    img.classList.add('active');
    showImage(url, prompt);
  });
  carousel.appendChild(img);
  return img;
}

function flashBadge() {
  clearTimeout(badgeTimer);
  newBadge.style.display = 'block';
  badgeTimer = setTimeout(() => { newBadge.style.display = 'none'; }, 4000);
}

function thumbMap() {
  const map = new Map();
  carousel.querySelectorAll('.thumb').forEach(t => map.set(urlPath(t.src), t));
  return map;
}

function clearMain() {
  currentImg.classList.remove('visible');
  currentImg.src = '';
  prevImg.src = '';
  placeholder.style.display = 'flex';
  promptDisplay.style.display = 'none';
  latestUrl = null;
}

async function sync(isInit = false) {
  const images = await fetchGallery();
  const apiMap  = new Map(images.map(item => [urlPath(item.url), item]));
  const current = thumbMap();

  let removedActive = false;
  for (const [path, thumb] of current) {
    if (!apiMap.has(path)) {
      if (thumb.classList.contains('active')) removedActive = true;
      thumb.remove();
    }
  }

  if (images.length === 0) { clearMain(); return; }

  let addedAny = false;
  for (const [path, item] of apiMap) {
    if (!current.has(path)) {
      addThumb(item.url, item.prompt);
      addedAny = true;
    }
  }

  // Reorder to match API order
  const thumbsAfter = new Map();
  carousel.querySelectorAll('.thumb').forEach(t => thumbsAfter.set(urlPath(t.src), t));
  for (const [path] of apiMap) {
    const thumb = thumbsAfter.get(path);
    if (thumb) carousel.appendChild(thumb);
  }

  const newest = images[0];

  if (isInit || removedActive || addedAny) {
    const newestThumb = [...carousel.querySelectorAll('.thumb')].find(t => urlPath(t.src) === urlPath(newest.url));
    carousel.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    if (newestThumb) {
      newestThumb.classList.add('active');
      newestThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    }
    showImage(newest.url, newest.prompt ?? '', !isInit && addedAny);
    latestUrl = newest.url;
    if (!isInit && addedAny) flashBadge();
  } else if (removedActive) {
    const firstThumb = carousel.querySelector('.thumb');
    if (firstThumb) {
      firstThumb.classList.add('active');
      showImage(firstThumb.src, firstThumb.dataset.prompt ?? '');
      latestUrl = firstThumb.src;
    } else {
      clearMain();
    }
  }
}

sync(true);
currentImg.addEventListener('click', () => {
  if (currentImg.classList.contains('visible')) window.open(currentImg.src, '_blank');
});

setInterval(() => sync(false), 5000);
</script>

</body>
</html>
