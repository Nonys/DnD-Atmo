<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD Atmosphere Generator</title>
  <link rel="stylesheet" href="/theme.css">
<style>
    :root { --panel: min(720px, calc(100vw - 32px)); }

    h1 a { margin-bottom: 6px; }
    body { padding-bottom: 36px; }

    #image-frame { width: var(--panel); }

    /* ---- Prompt display (dm overrides) ---- */
    #prompt-display { width: var(--panel); margin-top: 10px; margin-bottom: 0; }
    #prompt-text { height: 180px; resize: vertical; }

    /* ---- Readiness indicators ---- */
    #readiness {
      width: var(--panel);

      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
    }

    .indicator { display: flex; align-items: center; gap: 6px; }
    .indicator .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
      background: #4a4030; /* checking */
      transition: background 0.3s;
    }
    .indicator.ready  .dot { background: #5aaa5a; }
    .indicator.error  .dot { background: #aa4a4a; }
    .indicator.checking .dot {
      background: #7a6a3a;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .indicator.ready  { color: #6a9a6a; }
    .indicator.error  { color: #9a5a5a; }
    .indicator.checking { color: #7a6a4a; }

    #btn-grant-mic {
      padding: 2px 10px;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      border: 1px solid #5a7a5a;
      background: #141a14;
      color: #8aba8a;
      cursor: pointer;
    }
    #btn-grant-mic:hover { background: #1a241a; border-color: #7aaa7a; }

    /* ---- Controls ---- */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
      width: var(--panel);
    }

    button {
      padding: 10px 28px;
      font-family: inherit;
      font-size: 1rem;
      border: 1px solid #5a4a2a;
      background: #1f1a10;
      color: #e8d5a3;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }
    button:hover:not(:disabled) { background: #2e2510; border-color: #9a7a3a; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-start  { border-color: #4a7a4a; color: #a8d4a8; }
    #btn-start:hover:not(:disabled)  { background: #162016; border-color: #6aaa6a; }
    #btn-cancel { border-color: #5a4a4a; color: #c49a9a; font-size: 0.82rem; padding: 10px 18px; }
    #btn-cancel:hover:not(:disabled) { background: #1e1414; border-color: #8a6a6a; }
    #btn-submit, #btn-text-submit { border-color: #7a6a2a; color: #e8d070; letter-spacing: 0.12em; }
    #btn-submit:hover:not(:disabled),
    #btn-text-submit:hover:not(:disabled) { background: #221e08; border-color: #c0a030; }

    /* ---- Mode toggle ---- */
    #mode-toggle {
      display: flex;
      border: 1px solid #3a3020;
      margin-bottom: 12px;
      overflow: hidden;
      width: var(--panel);
    }
    .mode-btn {
      flex: 1;
      padding: 6px 24px;
      font-size: 0.75rem;
      border: none;
      border-radius: 0;
      background: #111008;
      color: #4a3f2a;
      letter-spacing: 0.1em;
    }
    .mode-btn:hover:not(.active) { background: #191510; color: #9a8a6a; border-color: transparent; }
    .mode-btn.active { background: #1f1a10; color: #e8d5a3; }

    /* ---- Scene input (text mode) ---- */
    #scene-controls {
      display: none;
      width: var(--panel);
      margin-bottom: 12px;
    }
    #scene-controls label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a4a;
      margin-bottom: 6px;
    }
    #scene-input {
      width: 100%;
      height: 240px;
      background: #141210;
      border: 1px solid #3a3020;
      color: #c9b99a;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
    }
    #scene-input:focus { outline: none; border-color: #6a5a3a; }
    #scene-input::placeholder { color: #3a3020; }

    /* ---- Upload mode controls ---- */
    #upload-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      width: var(--panel);

    }
    #upload-drop {
      width: 100%;
      min-height: 90px;
      background: #141210;
      border: 1px dashed #3a3020;
      color: #4a3f2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      position: relative;
    }
    #upload-drop:hover, #upload-drop.dragover { border-color: #6a5a3a; color: #9a8a6a; }
    #upload-drop.has-file { border-color: #4a7a4a; color: #7aba7a; }
    #upload-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    #upload-desc {
      width: 100%;
      height: 60px;
      background: #141210;
      border: 1px solid #3a3020;
      color: #c9b99a;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
    }
    #upload-desc:focus { outline: none; border-color: #6a5a3a; }
    #upload-desc::placeholder { color: #3a3020; }
    .upload-hidden-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #7a6a4a;
      letter-spacing: 0.06em;
      cursor: pointer;
      user-select: none;
      width: var(--panel);
      margin-bottom: 10px;
    }
    .upload-hidden-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #7a6a4a;
      cursor: pointer;
    }

    #timer {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      color: #e8d5a3;
      min-width: 60px;
      text-align: center;
    }
    #timer.recording { color: #d46a6a; }

    /* ---- Step progress ---- */
    #step-progress {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .step { display: flex; align-items: center; gap: 5px; color: #3a3020; transition: color 0.3s; }
    .step .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #3a3020;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .step.active { color: #c9a84a; }
    .step.active .dot { background: #c9a84a; animation: pulse 1.2s ease-in-out infinite; }
    .step.done   { color: #5aaa5a; }
    .step.done   .dot { background: #5aaa5a; }
    .step-sep { color: #3a3020; }

    /* ---- Transcription box ---- */
    #transcription-box {
      display: none;
      width: var(--panel);

      margin-bottom: 12px;
    }
    #transcription-box label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 5px;
    }
    #transcription-text {
      background: #0f0e0a;
      border: 1px solid #2a2518;
      color: #a09070;
      font-size: 0.88rem;
      font-style: italic;
      padding: 8px 10px;
      line-height: 1.5;
      min-height: 1.8em;
    }

    /* ---- Status ---- */
    #status {
      min-height: 1.4em;
      font-size: 0.85rem;
      color: #9a8a6a;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      text-align: center;
    }
    #status.error { color: #d46a6a; }
    #upload-status { min-height: 1.4em; font-size: 0.85rem; color: #9a8a6a; letter-spacing: 0.06em; margin-top: 8px; text-align: center; }
    #upload-status.error { color: #d46a6a; }
    #gallery-status { min-height: 1.4em; font-size: 0.85rem; color: #9a8a6a; letter-spacing: 0.06em; margin-bottom: 8px; text-align: center; }
    #gallery-status.error { color: #d46a6a; }
    #timing {
      min-height: 1.2em;
      font-size: 0.72rem;
      color: #6a5a40;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-align: center;
    }

    /* ---- Prompt ---- */
    #prompt-area {
      width: var(--panel);

      margin-bottom: 16px;
    }
    #prompt-area label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a4a;
      margin-bottom: 6px;
    }
    #base-prompt {
      width: 100%;
      height: 400px;
      background: #141210;
      border: 1px solid #3a3020;
      color: #c9b99a;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
    }
    #base-prompt:focus { outline: none; border-color: #6a5a3a; }

    /* ---- Text mode submit ---- */
    #text-controls {
      display: none;
      width: var(--panel);
      margin-bottom: 16px;
      align-items: center;
    }

    /* ---- Size section ---- */
    #size-section {
      width: var(--panel);
      margin-bottom: 16px;
    }
    #size-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a5040;
      margin-bottom: 6px;
    }
    #size-toggle {
      display: flex;
      border: 1px solid #3a3020;
      overflow: hidden;
    }
    .size-btn {
      flex: 1;
      padding: 5px 0;
      font-size: 0.72rem;
      border: none;
      border-radius: 0;
      background: #111008;
      color: #4a3f2a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .size-btn:hover:not(.active) { background: #191510; color: #9a8a6a; border-color: transparent; }
    .size-btn.active { background: #1f1a10; color: #e8d5a3; }

    /* ---- Cost footer ---- */
    #cost-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 24px;
      justify-content: center;
      padding: 6px 16px;
      background: #0a0a0c;
      border-top: 1px solid #2a2018;
      font-size: 0.75rem;
      color: #5a5040;
    }
    #cost-bar span { letter-spacing: 0.05em; }
    #cost-bar b { color: #9a8a5a; }

    body { padding-bottom: 36px; }

    /* ---- Tabs ---- */
    #tab-bar {
      display: flex;
      border: 1px solid #3a3020;
      width: var(--panel);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 24px;
      font-size: 0.78rem;
      border: none;
      border-radius: 0;
      background: #111008;
      color: #4a3f2a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .tab-btn:hover:not(.active) { background: #191510; color: #9a8a6a; }
    .tab-btn.active { background: #1f1a10; color: #e8d5a3; }

    #tab-generate, #tab-upload, #tab-gallery { display: none; flex-direction: column; align-items: center; width: 100%; }
    #tab-generate.active, #tab-upload.active, #tab-gallery.active { display: flex; }

    /* ---- Gallery carousel ---- */
    #gallery-carousel {
      width: var(--panel);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 16px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: #3a3020 #0d0d0f;
    }
    #gallery-carousel::-webkit-scrollbar { height: 4px; }
    #gallery-carousel::-webkit-scrollbar-track { background: #0d0d0f; }
    #gallery-carousel::-webkit-scrollbar-thumb { background: #3a3020; }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      scroll-snap-align: start;
    }
    .thumb {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 1px solid #2a2518;
      cursor: pointer;
      opacity: 0.65;
      transition: opacity 0.2s, border-color 0.2s, transform 0.12s;
    }
    .thumb:hover, .thumb.active { opacity: 1; border-color: #7a6a4a; }
    .thumb:active { transform: scale(0.88); }

    .btn-del {
      display: none;
      position: absolute;
      top: 3px; right: 3px;
      width: 20px; height: 20px;
      padding: 0;
      background: rgba(15,5,5,0.88);
      border: 1px solid #7a3a3a;
      color: #d46a6a;
      font-size: 0.8rem;
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-del:hover { background: #2a0a0a; border-color: #aa5a5a; }
    .thumb-wrap:hover .btn-del { display: block; }
    @media (pointer: coarse) { .thumb-wrap .btn-del { display: block; width: 28px; height: 28px; } }

    .btn-hide {
      display: none;
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      padding: 0;
      background: rgba(15,5,5,0.88);
      border: 1px solid #4a4030;
      color: #8a7a5a;
      font-size: 0.75rem;
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-hide:hover { background: #181508; border-color: #9a8a5a; color: #c0aa70; }
    .thumb-wrap:hover .btn-hide { display: block; }
    @media (pointer: coarse) { .thumb-wrap .btn-hide { display: block; width: 28px; height: 28px; } }
    .thumb-wrap.hidden .btn-hide { display: block; } /* always visible when hidden */
    .thumb-wrap.hidden .thumb { opacity: 0.25; filter: grayscale(40%); }
    .thumb-wrap.hidden .thumb:hover,
    .thumb-wrap.hidden .thumb.active { opacity: 0.55; }

    /* ---- Gallery frame (big preview) ---- */
    #gallery-frame {
      width: var(--panel);
      position: relative;
      aspect-ratio: 1;
      background: #1a1710;
      border: 1px solid #3a3020;
      margin-bottom: 16px;
      overflow: hidden;
      transition: aspect-ratio 0.4s ease;
    }
    #gallery-current-image, #gallery-prev-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #gallery-current-image { opacity: 0; transition: opacity 0.5s ease; z-index: 2; }
    #gallery-current-image.visible { opacity: 1; cursor: zoom-in; }
    #gallery-prev-image { opacity: 0; z-index: 1; transition: opacity 0.5s ease; }
    #gallery-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a3f2a;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      z-index: 0;
    }

  </style>
</head>
<body>

<h1><a href="/">DnD Atmosphere</a></h1>

<div id="tab-bar">
  <button class="tab-btn active" id="btn-tab-generate">&#9881; Generate</button>
  <button class="tab-btn"        id="btn-tab-upload">&#8679; Upload</button>
  <button class="tab-btn"        id="btn-tab-gallery">&#9783; Gallery</button>
</div>

<div id="tab-generate" class="active">

<div id="readiness">
  <span id="ind-mic"   class="indicator checking"><span class="dot"></span>Microphone</span>
  <button id="btn-grant-mic" style="display:none">Grant mic access</button>
  <span id="ind-model" class="indicator checking"><span class="dot"></span>Whisper model</span>
  <span id="ind-key"   class="indicator checking"><span class="dot"></span>API key</span>
</div>

<div id="mode-toggle">
  <button class="mode-btn active" id="btn-mode-voice">&#9679; Voice</button>
  <button class="mode-btn"        id="btn-mode-text">&#10002; Type</button>
</div>

<div id="prompt-area">
  <label>Base Style Prompt</label>
  <textarea id="base-prompt" spellcheck="false">fantasy tabletop RPG atmosphere, dramatic lighting, detailed environment art, digital painting, dark fantasy</textarea>
</div>

<div id="scene-controls">
  <label>Scene Description</label>
  <textarea id="scene-input" placeholder="Describe the scene..."></textarea>
</div>

<div id="size-section">
  <div id="size-label">Image Size</div>
  <div id="size-toggle">
    <button class="size-btn active" data-size="1024x1024">Square 1:1</button>
    <button class="size-btn"        data-size="1536x1024">Landscape 3:2</button>
    <button class="size-btn"        data-size="1024x1536">Portrait 2:3</button>
  </div>
</div>

<label id="upload-hidden-gen-label" class="upload-hidden-label">
  <input type="checkbox" id="upload-hidden-gen"> Hide from players
</label>

<div id="controls">
  <button id="btn-start" disabled>&#9679; Start Listen</button>
  <button id="btn-cancel" style="display:none">&#10005; I Changed My Mind</button>
  <span id="timer" style="display:none">0:00</span>
  <button id="btn-submit" style="display:none">&#10024; Do The Magic</button>
</div>

<div id="text-controls">
  <button id="btn-text-submit" disabled>&#10024; Do The Magic</button>
</div>

<div id="step-progress">
  <span id="step-transcribe" class="step"><span class="dot"></span>Transcribing</span>
  <span class="step-sep">→</span>
  <span id="step-generate" class="step"><span class="dot"></span>Generating image</span>
</div>

<div id="transcription-box">
  <label>Heard</label>
  <div id="transcription-text"></div>
</div>

<div id="status">Checking prerequisites...</div>
<div id="timing"></div>

<div id="image-frame">
  <div id="placeholder">Awaiting vision...</div>
  <img id="prev-image" src="" alt="">
  <img id="current-image" src="" alt="">
</div>

</div><!-- #tab-generate -->

<div id="tab-upload">

<div id="upload-controls">
  <div id="upload-drop">
    <span id="upload-drop-label">Click or drop images here</span>
    <input type="file" id="upload-file" accept="image/*" multiple>
  </div>
  <textarea id="upload-desc" placeholder="Description (optional)"></textarea>
  <label class="upload-hidden-label">
    <input type="checkbox" id="upload-hidden"> Hide from players
  </label>
  <button id="btn-upload-submit" disabled>&#8679; Add to Gallery</button>
  <div id="upload-status"></div>
</div>

</div><!-- #tab-upload -->

<div id="tab-gallery">

<div id="gallery-carousel"></div>
<div id="gallery-status"></div>

<div id="gallery-frame">
  <div id="gallery-placeholder">Select an image...</div>
  <img id="gallery-prev-image" src="" alt="">
  <img id="gallery-current-image" src="" alt="">
</div>

<div id="prompt-display">
  <label>Prompt used</label>
  <div id="prompt-text"></div>
</div>

</div><!-- #tab-gallery -->

<footer id="cost-bar">
  <span>Image: <b id="cost-image">—</b></span>
  <span>Session: <b id="cost-session">$0.000</b></span>
  <span>Lifetime: <b id="cost-lifetime">$0.000</b></span>
</footer>

<script>
// ============================================================
// State
// ============================================================
let mediaRecorder  = null;
let audioChunks    = [];
let elapsed        = 0;
let elapsedTimer   = null;
let isGenerating   = false;

// Readiness flags — all must be true before Record is enabled
const ready = { mic: false, model: false, apiKey: false };
let micBlocked  = false; // true only when mic is explicitly denied or unavailable
let currentMode = 'voice';

// ============================================================
// DOM refs
// ============================================================
const btnStart     = document.getElementById('btn-start');
const btnCancel    = document.getElementById('btn-cancel');
const btnSubmit    = document.getElementById('btn-submit');
const timerEl      = document.getElementById('timer');
const statusEl     = document.getElementById('status');
const currentImg   = document.getElementById('current-image');
const prevImg      = document.getElementById('prev-image');
const placeholder  = document.getElementById('placeholder');
const imageFrame   = document.getElementById('image-frame');
const galleryCarousel     = document.getElementById('gallery-carousel');
const galleryFrame        = document.getElementById('gallery-frame');
const galleryCurrentImg   = document.getElementById('gallery-current-image');
const galleryPrevImg      = document.getElementById('gallery-prev-image');
const galleryPlaceholder  = document.getElementById('gallery-placeholder');
const basePromptEl = document.getElementById('base-prompt');
const costImage    = document.getElementById('cost-image');
const costSession  = document.getElementById('cost-session');
const costLifetime = document.getElementById('cost-lifetime');
const indMic           = document.getElementById('ind-mic');
const indModel         = document.getElementById('ind-model');
const indKey           = document.getElementById('ind-key');
const btnGrantMic      = document.getElementById('btn-grant-mic');
const stepProgress     = document.getElementById('step-progress');
const stepTranscribe   = document.getElementById('step-transcribe');
const stepGenerate     = document.getElementById('step-generate');
const transcriptionBox = document.getElementById('transcription-box');
const transcriptionTxt = document.getElementById('transcription-text');
const promptDisplay    = document.getElementById('prompt-display');
const promptTxt        = document.getElementById('prompt-text');
const timingEl         = document.getElementById('timing');
const btnModeVoice     = document.getElementById('btn-mode-voice');
const btnModeText      = document.getElementById('btn-mode-text');
const textControls     = document.getElementById('text-controls');
const sceneControls    = document.getElementById('scene-controls');
const sceneInput       = document.getElementById('scene-input');
const btnTextSubmit    = document.getElementById('btn-text-submit');
const uploadControls   = document.getElementById('upload-controls');
const uploadDrop       = document.getElementById('upload-drop');
const uploadDropLabel  = document.getElementById('upload-drop-label');
const uploadFile       = document.getElementById('upload-file');
const uploadDesc       = document.getElementById('upload-desc');
const uploadHidden    = document.getElementById('upload-hidden');
const uploadHiddenGen = document.getElementById('upload-hidden-gen');
uploadHidden.addEventListener('change',    () => { uploadHiddenGen.checked = uploadHidden.checked; });
uploadHiddenGen.addEventListener('change', () => { uploadHidden.checked = uploadHiddenGen.checked; });
function isHideChecked() { return uploadHidden.checked; }
const btnUploadSubmit  = document.getElementById('btn-upload-submit');
const uploadStatusEl   = document.getElementById('upload-status');
function setUploadStatus(msg, isError = false) {
  uploadStatusEl.textContent = msg;

// ============================================================
// Pre-flight checks (run on load)
// ============================================================
async function preflight() {
  await Promise.all([checkBackendStatus(), checkMicPermission(), loadGallery()]);
}

async function checkBackendStatus() {
  try {
    const resp = await fetch('/api.php?action=status');
    const data = await resp.json();

    setIndicator(indModel, data.model_ready, 'Model ready', 'Model not found — run: dnd model');
    ready.model = data.model_ready;

    setIndicator(indKey, data.api_key_set, 'API key set', 'OPENAI_API_KEY missing');
    ready.apiKey = data.api_key_set;

    if (data.session_cost)  costSession.textContent  = '$' + data.session_cost.toFixed(3);
    if (data.lifetime_cost) costLifetime.textContent = '$' + data.lifetime_cost.toFixed(3);

    if (data.image_sizes) rebuildSizeButtons(data.image_sizes);

  } catch (e) {
    setIndicator(indModel, false, '', 'Backend unreachable');
    setIndicator(indKey,   false, '', 'Backend unreachable');
  }
  updateStartButton();
}

async function checkMicPermission() {
  // Browsers silently block mic on plain HTTP (non-localhost)
  if (!window.isSecureContext) {
    setIndicator(indMic, false, '', 'Microphone requires HTTPS — use localhost or add HTTPS');
    micBlocked = true;
    updateStartButton();
    return;
  }

  // Try the Permissions API (non-prompting check)
  if (navigator.permissions) {
    try {
      const result = await navigator.permissions.query({ name: 'microphone' });
      applyMicPermission(result.state);
      result.onchange = () => applyMicPermission(result.state);
      return;
    } catch (_) { /* browser doesn't support mic query — fall through */ }
  }

  // Can't query state — allow button click to trigger the browser prompt
  setIndicator(indMic, null, '', 'Click Record to grant access');
  micBlocked = false;
  updateStartButton();
}

function applyMicPermission(state) {
  if (state === 'granted') {
    setIndicator(indMic, true, 'Microphone ready');
    ready.mic = true;
    micBlocked = false;
    btnGrantMic.style.display = 'none';
  } else if (state === 'denied') {
    setIndicator(indMic, false, '', 'Microphone blocked — check chrome://settings/content/microphone');
    ready.mic = false;
    micBlocked = true;
    btnGrantMic.style.display = 'none';
  } else {
    // 'prompt' — not asked yet
    setIndicator(indMic, null, '', 'Permission not granted');
    ready.mic = false;
    micBlocked = false;
    btnGrantMic.style.display = '';
  }
  updateStartButton();
}

async function requestMicAccess() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    applyMicPermission('granted');
  } catch (e) {
    applyMicPermission('denied');
  }
}

btnGrantMic.addEventListener('click', requestMicAccess);

// ============================================================
// Indicator helper
// ============================================================
function setIndicator(el, state, okLabel, errLabel = '') {
  el.className = 'indicator ' + (state === true ? 'ready' : state === false ? 'error' : 'checking');
  const label = state === true ? okLabel : (errLabel || okLabel);
  el.innerHTML = '<span class="dot"></span>' + label;
}

// ============================================================
// Recording
// ============================================================
let cancelPending = false;

btnStart.addEventListener('click',  startRecording);
btnCancel.addEventListener('click', cancelRecording);
btnSubmit.addEventListener('click', submitRecording);

async function startRecording() {
  // If mic state was 'prompt', request permission now
  if (!ready.mic) {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach(t => t.stop());
      ready.mic = true;
      setIndicator(indMic, true, 'Microphone ready');
      updateStartButton();
    } catch (e) {
      setIndicator(indMic, false, '', 'Microphone blocked — allow in browser settings');
      ready.mic = false;
      updateStartButton();
      return;
    }
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setIndicator(indMic, false, '', 'Microphone access lost');
    ready.mic = false;
    updateStartButton();
    return;
  }

  cancelPending = false;
  audioChunks   = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    if (cancelPending) {
      cancelPending = false;
      audioChunks   = [];
      resetUI();
      return;
    }
    handleRecordingComplete();
  };
  mediaRecorder.start(1000);

  // Switch to recording UI
  btnStart.style.display  = 'none';
  btnCancel.style.display = '';
  btnSubmit.style.display = '';
  timerEl.style.display = 'inline';
  timerEl.classList.add('recording');
  startElapsed();
}

function cancelRecording() {
  cancelPending = true;
  stopElapsed();
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  timerEl.classList.remove('recording');
  timerEl.style.display = 'none';
  setStatus('');
}

function submitRecording() {
  stopElapsed();
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  btnCancel.style.display  = 'none';
  btnSubmit.style.display  = 'none';
  timerEl.classList.remove('recording');
  timerEl.style.display = 'none';
}

function startElapsed() {
  elapsed = 0;
  updateTimerDisplay(0);
  elapsedTimer = setInterval(() => {
    elapsed++;
    updateTimerDisplay(elapsed);
  }, 1000);
}

function stopElapsed() {
  clearInterval(elapsedTimer);
  elapsedTimer = null;
}

function updateTimerDisplay(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
}

// ============================================================
// After recording: two-step pipeline
// ============================================================
async function handleRecordingComplete() {
  if (audioChunks.length === 0) {
    setStatus('No audio captured.', true);
    resetUI();
    return;
  }

  isGenerating = true;
  updateAllButtons();
  timingEl.textContent = '';
  transcriptionBox.style.display = 'none';
  transcriptionTxt.textContent   = '';

  // ── Step 1: Transcribe ──────────────────────────────────
  showSteps('transcribe');
  setStatus('Transcribing speech...');
  const t0 = Date.now();
  const liveTimer = startLiveTiming(t0, sec => `${sec}s`);

  const blob     = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
  const formData = new FormData();
  formData.append('action',      'transcribe');
  formData.append('audio',       blob, 'recording.webm');
  formData.append('base_prompt', basePromptEl.value.trim());

  let transcribeResult;
  try {
    const resp = await fetch('/api.php', { method: 'POST', body: formData });
    transcribeResult = await resp.json();
    if (!resp.ok) throw new Error(transcribeResult.error ?? `HTTP ${resp.status}`);
  } catch (err) {
    clearInterval(liveTimer);
    hideSteps();
    setStatus('Transcription error: ' + err.message, true);
    isGenerating = false;
    resetUI();
    return;
  }

  clearInterval(liveTimer);
  const t1 = Date.now();

  // Show transcription result
  if (transcribeResult.transcription) {
    transcriptionTxt.textContent   = transcribeResult.transcription;
    transcriptionBox.style.display = 'block';
  } else {
    transcriptionTxt.textContent   = '(nothing heard)';
    transcriptionBox.style.display = 'block';
  }

  // ── Step 2: Generate image ──────────────────────────────
  showSteps('generate');
  setStatus('Generating image...');
  const transcribeSec = ((t1 - t0) / 1000).toFixed(1);
  const liveTimer2 = startLiveTiming(t1, sec => `${transcribeSec}s · ${sec}s`);

  const formData2 = new FormData();
  formData2.append('action',       'generate');
  formData2.append('base_prompt',  basePromptEl.value.trim());
  formData2.append('scene',        transcribeResult.transcription);
  formData2.append('size',         imageSize);
  formData2.append('hidden',       isHideChecked() ? '1' : '0');

  let genResult;
  try {
    const resp2 = await fetch('/api.php', { method: 'POST', body: formData2 });
    genResult = await resp2.json();
    if (!resp2.ok) throw new Error(genResult.error ?? `HTTP ${resp2.status}`);
  } catch (err) {
    clearInterval(liveTimer2);
    hideSteps();
    setStatus('Image generation error: ' + err.message, true);
    isGenerating = false;
    resetUI();
    return;
  }

  clearInterval(liveTimer2);
  const t2 = Date.now();
  hideSteps();
  displayImage(genResult.image_url, genResult.prompt_used, isHideChecked());

  costImage.textContent    = '$' + genResult.cost_image.toFixed(3);
  costSession.textContent  = '$' + genResult.cost_session.toFixed(3);
  costLifetime.textContent = '$' + genResult.cost_lifetime.toFixed(3);

  const epicLines = [
    'The vision takes shape... let it wash over you.',
    'The realm reveals itself. Breathe it in.',
    'The mists part. What do you see?',
    'Reality bends to your words.',
    'The scene is set. The dice await.',
    'Your world, rendered. Take a moment.',
    'The veil lifts. Behold.',
    'The arcane mirrors reflect your vision.',
  ];
  setStatus(epicLines[Math.floor(Math.random() * epicLines.length)]);
  timingEl.textContent = `Transcribed in ${((t1 - t0) / 1000).toFixed(1)}s · Generated in ${((t2 - t1) / 1000).toFixed(1)}s`;
  isGenerating = false;
  resetUI();
}

// ============================================================
// Upload mode
// ============================================================
function updateUploadButton() {
  btnUploadSubmit.disabled = isGenerating || !uploadFile.files || uploadFile.files.length === 0;
}

function updateDropLabel() {
  const n = uploadFile.files?.length ?? 0;
  if (n === 0) {
    uploadDropLabel.textContent = 'Click or drop images here';
    uploadDrop.classList.remove('has-file');
  } else if (n === 1) {
    uploadDropLabel.textContent = uploadFile.files[0].name;
    uploadDrop.classList.add('has-file');
  } else {
    uploadDropLabel.textContent = `${n} images selected`;
    uploadDrop.classList.add('has-file');
  }
}

uploadFile.addEventListener('change', () => { updateDropLabel(); updateUploadButton(); });

uploadDrop.addEventListener('dragover', e => { e.preventDefault(); uploadDrop.classList.add('dragover'); });
uploadDrop.addEventListener('dragleave', () => uploadDrop.classList.remove('dragover'));
uploadDrop.addEventListener('drop', e => {
  e.preventDefault();
  uploadDrop.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    const dt = new DataTransfer();
    [...e.dataTransfer.files].forEach(f => dt.items.add(f));
    uploadFile.files = dt.files;
    updateDropLabel();
    updateUploadButton();
  }
});

btnUploadSubmit.addEventListener('click', handleUpload);

async function handleUpload() {
  const files = [...(uploadFile.files ?? [])];
  if (files.length === 0) return;

  isGenerating = true;
  updateAllButtons();
  stepProgress.style.display   = 'flex';
  stepTranscribe.style.display = 'none';
  stepGenerate.className       = 'step active';

  const desc   = uploadDesc.value.trim();
  const hidden = isHideChecked();

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    setUploadStatus(files.length > 1 ? `Uploading ${i + 1} / ${files.length}...` : 'Uploading image...');

    const fd = new FormData();
    fd.append('action',      'upload');
    fd.append('image',       file, file.name);
    fd.append('description', desc);
    fd.append('hidden',      hidden ? '1' : '0');

    try {
      const resp = await fetch('/api.php', { method: 'POST', body: fd });
      const result = await resp.json();
      if (!resp.ok) throw new Error(result.error ?? `HTTP ${resp.status}`);
      displayImage(result.image_url, result.prompt_used, hidden);
    } catch (err) {
      hideSteps();
      setUploadStatus(`Upload failed (${file.name}): ` + err.message, true);
      isGenerating = false;
      updateUploadButton();
      return;
    }
  }

  hideSteps();
  setUploadStatus(files.length > 1 ? `${files.length} images added to gallery.` : 'Image added to gallery.');

  uploadFile.value    = '';
  uploadDesc.value    = '';
  uploadHidden.checked = false;
  uploadHiddenGen.checked = false;
  updateDropLabel();
  isGenerating = false;
  updateUploadButton();
}

// Step progress helpers
// ============================================================
function showSteps(activeStep) {
  stepProgress.style.display = 'flex';
  setStatus('');
  if (activeStep === 'transcribe') {
    stepTranscribe.className = 'step active';
    stepGenerate.className   = 'step';
  } else {
    stepTranscribe.className = 'step done';
    stepGenerate.className   = 'step active';
  }
}

function hideSteps() {
  stepProgress.style.display   = 'none';
  stepTranscribe.style.display = '';
  stepTranscribe.className     = 'step';
  stepGenerate.className       = 'step';
}

// ============================================================
// Image display with fade
// ============================================================
function displayImage(url, prompt = '', isHidden = false) {
  const thumb = addThumb(url, prompt, true, isHidden); // prepend — new images go to the front
  // Mark as active in carousel (for gallery tab)
  galleryCarousel.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
  // Show in generate tab's image-frame and scroll into view
  showInGenerateFrame(url, true);
  imageFrame.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showInGenerateFrame(url, slow = false) {
  placeholder.style.display = 'none';

  if (currentImg.classList.contains('visible') && currentImg.src !== url) {
    prevImg.src = currentImg.src;
    prevImg.classList.toggle('slow', slow);
    prevImg.style.opacity = '1';
    prevImg.offsetHeight;
    prevImg.style.opacity = '0';
  }

  currentImg.classList.remove('visible');
  currentImg.classList.toggle('slow', slow);
  currentImg.src = url;
  currentImg.onload = () => {
    imageFrame.style.aspectRatio = `${currentImg.naturalWidth} / ${currentImg.naturalHeight}`;
    currentImg.classList.add('visible');
  };
}

function addThumb(url, prompt = '', prepend = false, isHidden = false) {
  const wrap = document.createElement('div');
  wrap.className = 'thumb-wrap';
  if (isHidden) wrap.classList.add('hidden');

  const img = document.createElement('img');
  img.src = url;
  img.loading = 'lazy';
  img.className = 'thumb';
  img.dataset.prompt = prompt;
  img.addEventListener('click', () => selectThumb(img, url, prompt));

  wrap.appendChild(img);

  const hideBtn = document.createElement('button');
  hideBtn.className = 'btn-hide';
  hideBtn.textContent = isHidden ? '●' : '◎';
  hideBtn.title = isHidden ? 'Show to players' : 'Hide from players';
  hideBtn.addEventListener('click', e => {
    e.stopPropagation();
    toggleHidden(wrap, url, hideBtn);
  });
  wrap.appendChild(hideBtn);

  const del = document.createElement('button');
  del.className = 'btn-del';
  del.textContent = '×';
  del.title = 'Delete image';
  del.addEventListener('click', e => {
    e.stopPropagation();
    deleteImage(wrap, img, url);
  });
  wrap.appendChild(del);

  if (prepend && galleryCarousel.firstChild) {
    galleryCarousel.insertBefore(wrap, galleryCarousel.firstChild);
    galleryCarousel.scrollLeft = 0;
  } else {
    galleryCarousel.appendChild(wrap);
  }
  return img;
}

async function toggleHidden(wrap, url, btn) {
  const fd = new FormData();
  fd.append('action', 'toggle_hidden');
  fd.append('url', url);

  try {
    const resp = await fetch('/api.php', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error);
    const nowHidden = data.hidden;
    wrap.classList.toggle('hidden', nowHidden);
    btn.textContent = nowHidden ? '●' : '◎';
    btn.title = nowHidden ? 'Show to players' : 'Hide from players';
  } catch (e) {
    setGalleryStatus('Toggle failed: ' + e.message, true);
  }
}

async function deleteImage(wrap, img, url) {
  if (!confirm('Delete this image?')) return;

  const fd = new FormData();
  fd.append('action', 'delete');
  fd.append('url', url);

  try {
    const resp = await fetch('/api.php', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error);
  } catch (e) {
    setGalleryStatus('Delete failed: ' + e.message, true);
    return;
  }

  const wasActive = img.classList.contains('active');
  if (wasActive) {
    const allWraps = [...galleryCarousel.querySelectorAll('.thumb-wrap')];
    const idx      = allWraps.indexOf(wrap);
    const next     = allWraps[idx + 1] || allWraps[idx - 1];
    if (next) {
      const nextImg = next.querySelector('.thumb');
      selectThumb(nextImg, nextImg.src, nextImg.dataset.prompt || '');
    } else {
      galleryCurrentImg.classList.remove('visible');
      galleryCurrentImg.src = '';
      galleryPlaceholder.style.display = 'flex';
      promptDisplay.style.display = 'none';
    }
  }

  wrap.remove();
}

function selectThumb(thumbEl, url, prompt, slow = false) {
  galleryCarousel.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumbEl.classList.add('active');
  galleryPlaceholder.style.display = 'none';

  if (galleryCurrentImg.classList.contains('visible') && galleryCurrentImg.src !== url) {
    galleryPrevImg.src = galleryCurrentImg.src;
    galleryPrevImg.classList.toggle('slow', slow);
    galleryPrevImg.style.opacity = '1';
    galleryPrevImg.offsetHeight;
    galleryPrevImg.style.opacity = '0';
  }

  galleryCurrentImg.classList.remove('visible');
  galleryCurrentImg.classList.toggle('slow', slow);
  galleryCurrentImg.src = url;
  galleryCurrentImg.onload = () => {
    galleryFrame.style.aspectRatio = `${galleryCurrentImg.naturalWidth} / ${galleryCurrentImg.naturalHeight}`;
    galleryCurrentImg.classList.add('visible');
  };
  if (prompt) {
    promptTxt.textContent = prompt;
    promptDisplay.style.display = 'block';
  } else {
    promptDisplay.style.display = 'none';
  }
}

// ============================================================
// Gallery: load existing images from sessions/ on startup
// ============================================================
async function loadGallery() {
  try {
    const resp = await fetch('/api.php?action=gallery&dm=1');
    const data = await resp.json();
    if (!data.images || data.images.length === 0) return;

    data.images.forEach(item => addThumb(item.url, item.prompt, false, item.hidden ?? false)); // append; API returns newest-first
    // Auto-select the first (newest) image in the gallery frame
    const first = galleryCarousel.querySelector('.thumb');
    if (first) selectThumb(first, first.src, first.dataset.prompt || '');
  } catch (_) {
    // non-critical — silently ignore
  }
}


function updateAllButtons() {
  updateStartButton();
  updateTextButton();
  updateUploadButton();
}

function resetUI() {
  btnCancel.style.display = 'none';
  btnSubmit.style.display = 'none';
  if (currentMode === 'voice') btnStart.style.display = '';
  updateAllButtons();
}

function updateStartButton() {
  const micOk    = ready.mic || !micBlocked;
  const allReady = micOk && ready.model && ready.apiKey;
  btnStart.disabled = !allReady || isGenerating;
  // mode buttons disabled during recording/generation
  btnModeVoice.disabled = isGenerating || btnCancel.style.display !== 'none';
  btnModeText.disabled  = isGenerating || btnCancel.style.display !== 'none';

  if (!allReady && !isGenerating) {
    const missing = [];
    if (!micOk)        missing.push('microphone');
    if (!ready.model)  missing.push('whisper model');
    if (!ready.apiKey) missing.push('API key');
    setStatus('Not ready: ' + missing.join(', ') + '.', true);
  } else if (allReady && !isGenerating) {
    setStatus('');
  }
}

function startLiveTiming(startMs, labelFn) {
  timingEl.textContent = labelFn(0);
  return setInterval(() => {
    timingEl.textContent = labelFn(Math.floor((Date.now() - startMs) / 1000));
  }, 1000);
}

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'error' : '';
}

currentImg.addEventListener('click', () => {
  if (currentImg.classList.contains('visible')) window.open(currentImg.src, '_blank');
});
galleryCurrentImg.addEventListener('click', () => {
  if (galleryCurrentImg.classList.contains('visible')) window.open(galleryCurrentImg.src, '_blank');
});

if (saved !== null) basePromptEl.value = saved;
basePromptEl.addEventListener('blur', () => localStorage.setItem(PROMPT_KEY, basePromptEl.value));

// ── Image size picker ─────────────────────────────────────────
const SIZE_KEY = 'dnd-atmo-image-size';
let imageSize  = localStorage.getItem(SIZE_KEY) || '1024x1024';

function rebuildSizeButtons(sizes) {
  const toggle = document.getElementById('size-toggle');
  toggle.innerHTML = '';
  // If saved size isn't valid for this model, reset to first option
  if (!sizes.find(s => s.value === imageSize)) {
    imageSize = sizes[0].value;
    localStorage.setItem(SIZE_KEY, imageSize);
  }
  sizes.forEach(({ value, label }) => {
    const btn = document.createElement('button');
    btn.className = 'size-btn' + (value === imageSize ? ' active' : '');
    btn.dataset.size = value;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      imageSize = value;
      localStorage.setItem(SIZE_KEY, imageSize);
      toggle.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
    toggle.appendChild(btn);
  });
}

// ── Tabs ─────────────────────────────────────────────────────
document.getElementById('btn-tab-generate').addEventListener('click', () => switchTab('generate'));
document.getElementById('btn-tab-upload').addEventListener('click',   () => switchTab('upload'));
document.getElementById('btn-tab-gallery').addEventListener('click',  () => switchTab('gallery'));

function switchTab(tab) {
  ['generate', 'upload', 'gallery'].forEach(t => {
    document.getElementById('btn-tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab !== 'upload') setUploadStatus('');
  location.replace('#' + (tab === 'generate' ? 'generate-' + currentMode : tab));
}

// ── Boot ─────────────────────────────────────────────────────
const hashParts = location.hash.slice(1).split('-');
const initialTab  = ['generate', 'upload', 'gallery'].includes(hashParts[0]) ? hashParts[0] : 'generate';
const initialMode = hashParts[1] === 'text' ? 'text' : 'voice';
switchMode(initialMode);
switchTab(initialTab);
preflight();
</script>
