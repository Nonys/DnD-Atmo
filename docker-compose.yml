services:
  dnd-atmo:
    build: .
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./public/sessions:/app/public/sessions
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped

  https:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-entrypoint.sh:/entrypoint.sh:ro
      - https_certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped

volumes:
  https_certs:
